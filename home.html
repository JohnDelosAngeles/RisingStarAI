<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NBA Career Projection</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <header class="hero">
        <h1>NBA Career Projection</h1>
        <p>Search any NBA player and view their stats and projected career path.</p>

        <div class="search-bar">
            <form action="/search" method="GET">
                <input type="text" name="player" placeholder="Search for a player..." required>
                <button type="submit">Search</button>
            </form>
        </div>
    </header>

    <section class="top-players">
        <h2>Top 5 Players Right Now</h2>

        <div class="card-container">
            {% for player in players %}
            <div class="player-card">
                <div class="player-overlay">
                    <h3>{{ player.name }}</h3>
                    <p>PTS: {{ player.pts }} | REB: {{ player.reb }} | AST: {{ player.ast }}</p>
                </div>
            </div>
            {% endfor %}
        </div>
    </section>
</body>
</html>
